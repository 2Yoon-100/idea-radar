<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💡 Idea Radar</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0b0b12;--bg2:#111119;--bg3:#181826;--bg4:#1f1f30;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#edeaff;--muted:#8a87b0;--muted2:#5a5780;
  --purple:#8b5cf6;--purple-l:#a78bfa;--purple-d:#6d28d9;
  --purple-dim:rgba(139,92,246,0.12);
  --teal:#06b6d4;--teal-dim:rgba(6,182,212,0.1);
  --amber:#f59e0b;--amber-dim:rgba(245,158,11,0.1);
  --green:#10b981;--green-dim:rgba(16,185,129,0.1);
  --coral:#f43f5e;--coral-dim:rgba(244,63,94,0.1);
  --blue:#3b82f6;--blue-dim:rgba(59,130,246,0.1);
  --r:10px;--r2:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'Pretendard','Noto Sans KR',sans-serif;line-height:1.7;font-size:15px;}

.hd{background:var(--bg2);border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;}
.logo{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:700;}
.dot{width:8px;height:8px;background:var(--green);border-radius:50%;box-shadow:0 0 8px var(--green);animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.hd-r{text-align:right;font-size:13px;color:var(--muted);}
.hd-r strong{display:block;font-size:14px;color:var(--text);margin-bottom:2px;}

.wrap{max-width:1400px;margin:0 auto;padding:24px 20px;}

/* TODAY REC */
.rec{background:linear-gradient(135deg,rgba(139,92,246,.16),rgba(6,182,212,.08));border:1px solid rgba(139,92,246,.3);border-radius:var(--r2);padding:24px 28px;margin-bottom:20px;}
.rec-head{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
.badge{background:var(--purple);color:#fff;font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;letter-spacing:.5px;}
.rec-ts{font-size:13px;color:var(--muted);}
.rec-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
@media(max-width:660px){.rec-grid{grid-template-columns:1fr;}}
.rec-item .rl{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--purple-l);margin-bottom:6px;}
.rec-item .rv{font-size:14px;color:var(--text);line-height:1.6;}
.rec-goals{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px;padding-top:16px;border-top:1px solid rgba(255,255,255,.07);}
.rg{background:rgba(0,0,0,.2);border-radius:8px;padding:12px 14px;}
.rg .rl{margin-bottom:4px;}
.rg .rv{font-size:13px;}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
@media(max-width:660px){.stats{grid-template-columns:repeat(2,1fr);}}
.sc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;}
.sc .lb{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.sc .vl{font-size:28px;font-weight:700;letter-spacing:-1px;line-height:1;margin-bottom:3px;}
.sc .sb{font-size:12px;color:var(--muted);}

/* SEC TITLE */
.sec{font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin:24px 0 14px;display:flex;align-items:center;gap:8px;}
.sec::after{content:'';flex:1;height:1px;background:var(--border);}

/* TAGS */
.tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:4px;}
.tag{background:var(--purple-dim);border:1px solid rgba(139,92,246,.2);color:#c4b5fd;padding:5px 13px;border-radius:20px;font-size:13px;font-weight:500;}

/* CARDS */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:16px;margin-bottom:8px;}
@media(max-width:500px){.grid{grid-template-columns:1fr;}}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;transition:border-color .2s,transform .15s;}
.card:hover{border-color:rgba(139,92,246,.4);transform:translateY(-2px);}
.bt-TRAFFIC_TOOL   .card-accent{background:var(--teal);}
.bt-STANDALONE_SAAS .card-accent{background:var(--amber);}
.bt-APP_PROGRAM    .card-accent{background:var(--coral);}
.card-accent{height:3px;width:100%;}

/* 신규 뱃지 */
.new-badge{display:inline-block;background:var(--green);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;margin-left:6px;vertical-align:middle;}

/* 순위 뱃지 */
.rank-badge{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;font-size:13px;font-weight:700;flex-shrink:0;}
.rank-1{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(245,158,11,.3);}
.rank-2{background:var(--teal-dim);color:var(--teal);border:1px solid rgba(6,182,212,.3);}
.rank-3{background:var(--purple-dim);color:var(--purple-l);border:1px solid rgba(139,92,246,.3);}
.rank-other{background:var(--bg3);color:var(--muted);border:1px solid var(--border);}

.card-body{padding:20px 22px;}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:12px;}
.card-cat{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.card-name{font-size:17px;font-weight:700;color:var(--text);line-height:1.3;}
.card-tagline{font-size:13px;color:var(--muted);margin-top:3px;}

/* 종합 점수 박스 */
.scores-box{flex-shrink:0;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:10px 14px;text-align:center;min-width:80px;}
.score-main{font-size:26px;font-weight:700;line-height:1;color:var(--amber);}
.score-label{font-size:11px;color:var(--muted);letter-spacing:.4px;text-transform:uppercase;margin-bottom:6px;}
.score-bars{display:flex;flex-direction:column;gap:5px;}
.score-mini-row{display:flex;align-items:center;gap:5px;}
.score-mini-label{font-size:10px;color:var(--muted);width:42px;text-align:right;flex-shrink:0;white-space:nowrap;}
.score-mini-track{flex:1;height:5px;background:var(--bg4);border-radius:3px;overflow:hidden;}
.score-mini-fill{height:100%;border-radius:3px;}
.score-mini-num{font-size:10px;color:var(--muted);width:14px;text-align:right;}

/* 순위 이유 */
.rank-reason{font-size:12px;color:var(--purple-l);background:var(--purple-dim);border-radius:6px;padding:6px 10px;margin-bottom:12px;}

.pain{font-size:13px;color:var(--muted);background:rgba(244,63,94,.06);border-left:2px solid var(--coral);padding:8px 12px;border-radius:0 6px 6px 0;margin-bottom:14px;line-height:1.6;}

.bt-badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:5px 12px;border-radius:6px;margin-bottom:14px;}
.bt-badge-TRAFFIC_TOOL   {background:var(--teal-dim);color:var(--teal);border:1px solid rgba(6,182,212,.2);}
.bt-badge-STANDALONE_SAAS{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(245,158,11,.2);}
.bt-badge-APP_PROGRAM    {background:var(--coral-dim);color:var(--coral);border:1px solid rgba(244,63,94,.2);}

/* 핵심 지표 4칸 */
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.metric{background:var(--bg3);border-radius:8px;padding:10px 13px;}
.metric .mk{font-size:11px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px;}
.metric .mv{font-size:15px;font-weight:600;color:var(--text);}
.metric .mv.green{color:var(--green);}
.metric .mv.amber{color:var(--amber);}
.metric .mv.teal{color:var(--teal);}

/* 수익 타임라인 */
.rev-timeline{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.rev-item{background:var(--bg3);border-radius:8px;padding:10px 12px;text-align:center;}
.rev-period{font-size:11px;color:var(--muted);margin-bottom:4px;}
.rev-val{font-size:14px;font-weight:700;color:var(--green);}

.pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.pill{font-size:12px;padding:3px 10px;border-radius:20px;font-weight:500;}
.p-teal  {background:var(--teal-dim);  color:var(--teal);  border:1px solid rgba(6,182,212,.15);}
.p-amber {background:var(--amber-dim); color:var(--amber); border:1px solid rgba(245,158,11,.15);}
.p-green {background:var(--green-dim); color:var(--green); border:1px solid rgba(16,185,129,.15);}
.p-coral {background:var(--coral-dim); color:var(--coral); border:1px solid rgba(244,63,94,.15);}
.p-purple{background:var(--purple-dim);color:var(--purple-l);border:1px solid rgba(139,92,246,.15);}
.p-blue  {background:var(--blue-dim);  color:var(--blue);  border:1px solid rgba(59,130,246,.15);}

.mvp{margin-bottom:12px;}
.mvp-title{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.mvp-feat{font-size:13px;color:var(--text);padding:3px 0;display:flex;gap:8px;align-items:flex-start;}
.mvp-feat span{color:var(--green);flex-shrink:0;}

.strategy{font-size:13px;color:var(--muted);border-top:1px solid var(--border);padding-top:12px;line-height:1.6;}
.strategy strong{color:var(--text);display:block;margin-bottom:3px;font-size:12px;text-transform:uppercase;letter-spacing:.3px;}

/* Claude 프롬프트 */
.prompt-section{background:var(--bg3);border:1px solid rgba(139,92,246,.25);border-radius:10px;margin-top:16px;overflow:hidden;}
.prompt-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:rgba(139,92,246,.1);cursor:pointer;user-select:none;}
.prompt-header-left{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--purple-l);}
.prompt-toggle{font-size:12px;color:var(--muted);}
.prompt-body{padding:16px;display:none;}
.prompt-body.open{display:block;}
.prompt-text{font-size:13px;line-height:1.7;color:var(--text);background:var(--bg4);border:1px solid var(--border);border-radius:8px;padding:14px 16px;white-space:pre-wrap;word-break:break-word;max-height:320px;overflow-y:auto;margin-bottom:12px;font-family:-apple-system,sans-serif;}
.copy-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:var(--purple);color:#fff;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;transition:background .2s;}
.copy-btn:hover{background:var(--purple-d);}
.copy-btn.copied{background:var(--green);}

/* TABLE */
.tbl{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:24px;}
.tr{display:grid;grid-template-columns:32px 28px 1.8fr 2fr 1fr 90px;gap:10px;align-items:center;padding:14px 18px;border-bottom:1px solid var(--border);font-size:13px;transition:background .15s;}
.tr:last-child{border-bottom:none;}
.tr:hover:not(.th){background:var(--bg3);}
.th{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);background:var(--bg3);}
.th:hover{background:var(--bg3)!important;}
.sbar{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-top:4px;}
.sfill{height:100%;border-radius:3px;background:var(--amber);}

/* CHART */
.charts{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px;}
@media(max-width:720px){.charts{grid-template-columns:1fr;}}
.cc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px;}
.cc-t{font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px;}
.srow{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
.sname{width:100px;font-size:13px;color:var(--muted);flex-shrink:0;}
.btrack{flex:1;height:7px;background:var(--bg3);border-radius:4px;overflow:hidden;}
.bfill{height:100%;border-radius:4px;transition:width .8s ease;}
.scnt{font-size:13px;font-weight:600;color:var(--text);width:30px;text-align:right;}

/* SETUP */
.setup{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:32px;max-width:640px;margin:40px auto;}
.setup h2{font-size:18px;font-weight:600;margin-bottom:8px;}
.setup p{color:var(--muted);font-size:14px;margin-bottom:20px;line-height:1.6;}
.step{display:flex;gap:14px;margin-bottom:16px;align-items:flex-start;}
.sn{width:26px;height:26px;border-radius:50%;background:var(--purple-dim);border:1px solid rgba(139,92,246,.3);color:var(--purple-l);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
.sc2 h3{font-size:14px;font-weight:600;color:var(--text);margin-bottom:3px;}
.sc2 p{font-size:13px;color:var(--muted);margin:0;line-height:1.5;}
code{background:var(--bg3);border:1px solid var(--border);padding:2px 7px;border-radius:4px;font-size:12px;font-family:monospace;color:var(--teal);}

footer{text-align:center;padding:28px;color:var(--muted2);font-size:13px;border-top:1px solid var(--border);}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<header class="hd">
  <div class="logo"><div class="dot"></div>💡 Idea Radar</div>
  <div class="hd-r">
    <strong id="upd">로딩 중...</strong>
    매일 오전 8시 자동 업데이트
  </div>
</header>

<div class="wrap">
  <div id="loading" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:55vh;gap:14px;color:var(--muted);">
    <div style="width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--purple);border-radius:50%;animation:spin .8s linear infinite;"></div>
    <span style="font-size:15px;">데이터 분석 중...</span>
  </div>
  <div id="app" style="display:none"></div>
</div>

<footer>Idea Radar — Reddit · Hacker News · 클리앙 · Product Hunt 매일 자동 수집 분석</footer>

<script>
// ──────────────────────────────────────
const GITHUB_USER = "2Yoon-100";
const GITHUB_REPO = "idea-radar";
// ──────────────────────────────────────

const BASE = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/data`;

const BT = {
  TRAFFIC_TOOL:    {label:"📈 트래픽 사이트 툴", desc:"무료 툴 모음 사이트"},
  STANDALONE_SAAS: {label:"🚀 독립 SaaS",        desc:"월정액 구독 서비스"},
  APP_PROGRAM:     {label:"📱 앱 / 프로그램",     desc:"모바일 앱 또는 프로그램"}
};
const COMP_P = {"낮음":"p-green","중간":"p-amber","높음":"p-coral"};
const DIFF_P = {"하":"p-green","중":"p-amber","상":"p-coral"};
const SRC_C  = {reddit:"#f43f5e",hackernews:"#f59e0b",clien:"#06b6d4",producthunt:"#10b981"};
const SRC_N  = {reddit:"Reddit",hackernews:"Hacker News",clien:"클리앙",producthunt:"Product Hunt"};
const SCORE_COLORS = ["#8b5cf6","#06b6d4","#f59e0b","#10b981"];

function el(id){return document.getElementById(id);}

async function load(){
  const [ar,hr]=await Promise.all([
    fetch(`${BASE}/analysis.json?t=${Date.now()}`),
    fetch(`${BASE}/history.json?t=${Date.now()}`).catch(()=>({ok:false}))
  ]);
  if(!ar.ok) throw new Error();
  return {data:await ar.json(), history:hr.ok?await hr.json():[]};
}

function scoreMini(label, val, color){
  const n = parseInt(val) || 0;
  return `<div class="score-mini-row">
    <div class="score-mini-label">${label}</div>
    <div class="score-mini-track"><div class="score-mini-fill" style="width:${n*10}%;background:${color}"></div></div>
    <div class="score-mini-num">${n}</div>
  </div>`;
}

function formatRevenue(val){
  if(!val) return "—";
  if(typeof val==="string" && val.includes("만")) return val;
  if(typeof val==="string"){
    return val.replace(/(\d+)/g, m=>{
      const n=parseInt(m);
      if(n>=10000) return Math.round(n/10000)+"만";
      return m;
    })+(val.includes("원")?"":"원");
  }
  return val;
}

function rankBadge(rank){
  const cls = rank===1?"rank-1":rank===2?"rank-2":rank===3?"rank-3":"rank-other";
  return `<div class="rank-badge ${cls}">${rank}</div>`;
}

function cardHTML(c, rank, isNew){
  const ba = c.business_analysis||{};
  const bt = ba.build_decision||"";
  const prod = ba.product||{};
  const tim = ba.time||{};
  const cost = ba.cost||{};
  const rev = ba.revenue||{};
  const mkt = ba.market||{};
  const bld = ba.build||{};
  const risk = ba.risk||{};
  const sc = ba.score||{};
  const btInfo = BT[bt]||{label:bt,desc:""};
  const actualRank = ba.rank || rank;

  const scoreItems = [
    {l:"시장성", v:sc.market_potential, c:SCORE_COLORS[0]},
    {l:"제작",   v:sc.build_ease,       c:SCORE_COLORS[1]},
    {l:"수익속도",v:sc.revenue_speed,   c:SCORE_COLORS[2]},
    {l:"경쟁우위",v:sc.competition_advantage, c:SCORE_COLORS[3]}
  ];

  const prompt = ba.claude_prompt||"";
  const promptId = `prompt-${rank}`;
  const bodyId   = `body-${rank}`;
  const btnId    = `btn-${rank}`;

  return `
<div class="card bt-${bt}">
  <div class="card-accent"></div>
  <div class="card-body">
    <div class="card-top">
      <div>
        <div class="card-cat">
          ${rankBadge(actualRank)}
          <span style="margin-left:8px">${c.category||"미분류"}</span>
          ${isNew||c.is_new?'<span class="new-badge">NEW</span>':''}
        </div>
        <div class="card-name">${prod.name||c.category||"-"}</div>
        <div class="card-tagline">${prod.tagline||""}</div>
      </div>
      <div class="scores-box">
        <div class="score-main">${sc.overall||0}</div>
        <div class="score-label">종합 /10</div>
        <div class="score-bars">
          ${scoreItems.map(s=>scoreMini(s.l,s.v,s.c)).join("")}
        </div>
      </div>
    </div>

    ${ba.rank_reason?`<div class="rank-reason">📊 ${ba.rank_reason}</div>`:""}

    <div class="pain">🔍 ${c.pain_point||"-"}</div>

    ${bt?`<div class="bt-badge bt-badge-${bt}">${btInfo.label} <span style="font-weight:400;opacity:.7">— ${btInfo.desc}</span></div>`:""}

    <div class="metrics">
      <div class="metric"><div class="mk">⏱ MVP 완성</div><div class="mv teal">${tim.mvp_days?tim.mvp_days+"일":"—"}</div></div>
      <div class="metric"><div class="mk">🚀 런칭 가능</div><div class="mv teal">${tim.launch_ready_days?tim.launch_ready_days+"일":"—"}</div></div>
      <div class="metric"><div class="mk">💸 월 고정비</div><div class="mv amber">${cost.monthly_fixed||"—"}</div></div>
      <div class="metric"><div class="mk">💰 첫 수익</div><div class="mv green">${tim.first_revenue_days?tim.first_revenue_days+"일 후":"—"}</div></div>
    </div>

    <div class="rev-timeline">
      <div class="rev-item"><div class="rev-period">1개월</div><div class="rev-val">${formatRevenue(rev.month1)}</div></div>
      <div class="rev-item"><div class="rev-period">3개월</div><div class="rev-val">${formatRevenue(rev.month3)}</div></div>
      <div class="rev-item"><div class="rev-period">6개월</div><div class="rev-val">${formatRevenue(rev.month6)}</div></div>
    </div>

    <div class="pills">
      ${rev.model?`<span class="pill p-amber">💰 ${rev.model}</span>`:""}
      ${rev.price_point?`<span class="pill p-green">${rev.price_point}</span>`:""}
      ${mkt.competition?`<span class="pill ${COMP_P[mkt.competition]||'p-purple'}">경쟁 ${mkt.competition}</span>`:""}
      ${bld.difficulty?`<span class="pill ${DIFF_P[bld.difficulty]||'p-purple'}">난이도 ${bld.difficulty}</span>`:""}
      ${bld.tech_stack?`<span class="pill p-blue">🛠 ${bld.tech_stack}</span>`:""}
    </div>

    ${(bld.mvp_features||[]).length?`
    <div class="mvp">
      <div class="mvp-title">MVP 핵심 기능</div>
      ${(bld.mvp_features||[]).slice(0,3).map(f=>`<div class="mvp-feat"><span>›</span>${f}</div>`).join("")}
    </div>`:""}

    <div class="strategy">
      ${bld.quick_traffic?`<strong>🚀 빠른 트래픽</strong>${bld.quick_traffic}`:""}
      ${risk.main_risk?`<strong style="margin-top:8px">⚠️ 리스크 (${risk.risk_level||""})</strong>${risk.main_risk}`:""}
    </div>

    ${prompt?`
    <div class="prompt-section" id="${promptId}">
      <div class="prompt-header" onclick="togglePrompt('${bodyId}','${rank}')">
        <div class="prompt-header-left">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
          Claude Opus / Sonnet 개발 프롬프트
        </div>
        <span class="prompt-toggle" id="toggle-${rank}">▼ 펼치기</span>
      </div>
      <div class="prompt-body" id="${bodyId}">
        <div class="prompt-text" id="pt-${rank}">${prompt.replace(/</g,"&lt;").replace(/>/g,"&gt;")}</div>
        <button class="copy-btn" id="${btnId}" onclick="copyPrompt('pt-${rank}','${btnId}')">
          📋 프롬프트 복사 — Claude에 바로 붙여넣기
        </button>
      </div>
    </div>`:""}
  </div>
</div>`;
}

function tableRow(c,i){
  const ba=c.business_analysis||{};
  const bt=ba.build_decision||"";
  const btInfo=BT[bt]||{label:bt};
  const sc=ba.score||{};
  const btPill={TRAFFIC_TOOL:"p-teal",STANDALONE_SAAS:"p-amber",APP_PROGRAM:"p-coral"};
  const actualRank = ba.rank || (i+1);
  const rc = actualRank===1?"rank-1":actualRank===2?"rank-2":actualRank===3?"rank-3":"rank-other";
  return `
  <div class="tr">
    <div><span class="rank-badge ${rc}" style="width:24px;height:24px;font-size:11px">${actualRank}</span></div>
    <div>${c.is_new?'<span class="new-badge">NEW</span>':''}</div>
    <div style="font-weight:600">${c.category||"-"}</div>
    <div style="color:var(--muted);font-size:12px">${ba.product?.tagline||c.pain_point||"-"}</div>
    <div>${bt?`<span class="pill ${btPill[bt]||'p-purple'}" style="font-size:11px">${btInfo.label}</span>`:""}</div>
    <div>
      <div style="font-weight:700;font-size:14px;color:var(--amber)">${sc.overall||c.urgency_score||0}/10</div>
      <div class="sbar"><div class="sfill" style="width:${(sc.overall||c.urgency_score||0)*10}%"></div></div>
    </div>
  </div>`;
}

function togglePrompt(bodyId, rank){
  const body=el(bodyId);
  const isOpen=body.classList.contains("open");
  body.classList.toggle("open",!isOpen);
  el("toggle-"+rank).textContent=isOpen?"▼ 펼치기":"▲ 접기";
}

function copyPrompt(textId, btnId){
  const text=el(textId)?.textContent||"";
  navigator.clipboard.writeText(text).then(()=>{
    const btn=el(btnId);
    if(btn){
      btn.classList.add("copied");
      btn.textContent="✅ 복사 완료! Claude에 붙여넣기하세요";
      setTimeout(()=>{btn.classList.remove("copied");btn.innerHTML="📋 프롬프트 복사 — Claude에 바로 붙여넣기";},2500);
    }
  }).catch(()=>alert("텍스트를 직접 선택해서 복사하세요."));
}

function render(data, history){
  const stats   = data.stats||{};
  const topIdeas= data.top_ideas||[];
  const todayNew= data.today_new||[];
  const allAcc  = data.all_accumulated||topIdeas;
  const rec     = data.daily_recommendation||{};
  const trends  = data.trending_topics||[];

  el("upd").textContent = data.generated_at||"-";

  el("app").innerHTML = `
  <!-- 오늘의 추천 -->
  <div class="rec">
    <div class="rec-head">
      <span class="badge">⭐ 오늘의 추천</span>
      <span class="rec-ts">${data.generated_at||""}</span>
    </div>
    <div class="rec-grid">
      <div class="rec-item"><div class="rl">지금 만들 것</div><div class="rv" style="font-size:17px;font-weight:700;color:#a78bfa">${rec.recommended_category||"분석 중..."}</div></div>
      <div class="rec-item"><div class="rl">왜 지금인가</div><div class="rv">${rec.why_first||rec.why_today||"—"}</div></div>
      <div class="rec-item"><div class="rl">내일 첫 번째 행동</div><div class="rv">${rec.tomorrow_action||rec.first_step||"—"}</div></div>
    </div>
    <div class="rec-goals">
      <div class="rg"><div class="rl">성공 신호</div><div class="rv">${rec.success_signal||"—"}</div></div>
      <div class="rg"><div class="rl">7일 목표</div><div class="rv">${rec.day7_goal||"—"}</div></div>
      <div class="rg"><div class="rl">30일 목표</div><div class="rv">${rec.day30_goal||"—"}</div></div>
    </div>
  </div>

  <!-- 인사이트 -->
  ${data.top_insight?`
  <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;margin-bottom:20px;display:flex;gap:10px;align-items:flex-start;">
    <span style="font-size:18px;flex-shrink:0;margin-top:2px">✨</span>
    <div>
      <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:3px;">오늘의 핵심 인사이트</div>
      <div style="font-size:15px;font-weight:500;">${data.top_insight}</div>
    </div>
  </div>`:""}

  <!-- 통계 -->
  <div class="stats">
    <div class="sc"><div class="lb">총 누적 게시물</div><div class="vl" style="color:var(--purple-l)">${(stats.total_posts||0).toLocaleString()}</div><div class="sb">30일 게시물</div></div>
    <div class="sc"><div class="lb">오늘 수집</div><div class="vl" style="color:var(--teal)">${(stats.today_posts||0).toLocaleString()}</div><div class="sb">신규</div></div>
    <div class="sc"><div class="lb">누적 아이디어</div><div class="vl" style="color:var(--amber)">${stats.accumulated_ideas||allAcc.length}</div><div class="sb">30일 누적</div></div>
    <div class="sc"><div class="lb">누적 1위 점수</div><div class="vl" style="color:var(--green)">${topIdeas[0]?.business_analysis?.score?.overall||0}<span style="font-size:13px;font-weight:400;color:var(--muted)">/10</span></div><div class="sb">${topIdeas[0]?.business_analysis?.product?.name||topIdeas[0]?.category||"-"}</div></div>
  </div>

  <!-- 트렌드 -->
  ${trends.length?`
  <div class="sec">🔥 트렌드 키워드</div>
  <div class="tags">${trends.map(t=>`<span class="tag">#${t}</span>`).join("")}</div>
  <div style="height:12px"></div>`:""}

  <!-- 누적 TOP 5 -->
  <div class="sec">🏆 누적 TOP 5 — 30일간 상대 비교 점수 기준</div>
  <div class="grid">${topIdeas.slice(0,5).map((c,i)=>cardHTML(c,i+1,false)).join("")}</div>

  <!-- 오늘 신규 -->
  ${todayNew.length?`
  <div class="sec">🆕 오늘 신규 아이디어</div>
  <div class="grid">${todayNew.map((c,i)=>cardHTML(c,i+1,true)).join("")}</div>`:""}

  <!-- 차트 -->
  <div class="sec">📊 수집 현황</div>
  <div class="charts">
    <div class="cc"><div class="cc-t">소스별 수집량</div><div id="src-bars"></div></div>
    <div class="cc"><div class="cc-t">일별 수집량 추이</div><canvas id="tc" height="140"></canvas></div>
  </div>

  <!-- 전체 누적 순위 -->
  <div class="sec">📋 전체 누적 아이디어 순위</div>
  <div class="tbl">
    <div class="tr th"><div>순위</div><div></div><div>카테고리</div><div>아이디어</div><div>유형</div><div>종합점수</div></div>
    ${allAcc.map((c,i)=>tableRow(c,i)).join("")}
  </div>
  `;

  // 소스 바
  const srcEl=el("src-bars");
  if(srcEl){
    const total=Object.values(stats.sources||{}).reduce((a,b)=>a+b,0)||1;
    srcEl.innerHTML=Object.entries(stats.sources||{}).map(([k,v])=>`
      <div class="srow">
        <div class="sname">${SRC_N[k]||k}</div>
        <div class="btrack"><div class="bfill" style="width:${(v/total*100).toFixed(0)}%;background:${SRC_C[k]||"#8b5cf6"}"></div></div>
        <div class="scnt">${v}</div>
      </div>`).join("");
  }

  if(history.length>1){
    const ctx=el("tc")?.getContext("2d");
    if(ctx) new Chart(ctx,{
      type:"line",
      data:{labels:history.map(h=>h.date.slice(5)),datasets:[{
        data:history.map(h=>h.today_posts||0),
        borderColor:"#8b5cf6",backgroundColor:"rgba(139,92,246,.08)",
        borderWidth:2,fill:true,tension:.4,pointRadius:3,pointBackgroundColor:"#8b5cf6"
      }]},
      options:{responsive:true,plugins:{legend:{display:false}},scales:{
        x:{grid:{color:"rgba(255,255,255,.04)"},ticks:{color:"#8a87b0",font:{size:12}}},
        y:{grid:{color:"rgba(255,255,255,.04)"},ticks:{color:"#8a87b0",font:{size:12}}}
      }}
    });
  }
}

function renderSetup(){
  el("app").innerHTML=`
  <div class="setup">
    <h2>⚙️ 초기 설정 필요</h2>
    <p>GITHUB_USER 값을 본인의 GitHub 아이디로 수정해주세요.</p>
  </div>`;
}

(async()=>{
  try{
    if(GITHUB_USER==="YOUR_GITHUB_USERNAME"){el("loading").style.display="none";el("app").style.display="block";renderSetup();return;}
    const {data,history}=await load();
    el("loading").style.display="none";el("app").style.display="block";
    render(data,history);
  }catch(e){
    el("loading").style.display="none";el("app").style.display="block";
    renderSetup();
  }
})();
</script>
