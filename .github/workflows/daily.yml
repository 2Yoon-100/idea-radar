name: Daily Idea Radar

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  collect-and-analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: 라이브러리 설치
        run: pip install -r requirements.txt
      - name: 데이터 수집
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        run: python scripts/collector.py
      - name: AI 분석
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: python scripts/analyzer.py
      - name: 결과 저장 (자동 커밋)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Idea Radar Bot"
          git add data/
          git diff --staged --quiet || git commit -m "자동 업데이트: $(date '+%Y-%m-%d %H:%M KST')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
